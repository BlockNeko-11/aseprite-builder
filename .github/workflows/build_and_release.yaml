#        with:
#          repo_token: ${{ secrets.GITHUB_TOKEN }}
#          file: aseprite/build/bin/Aseprite-${{ inputs.aseprite_version }}-${{ runner.os }}.zip
#          asset_name: Aseprite-${{ inputs.aseprite_version }}-${{ runner.os }}.zip
#          tag: ${{ inputs.aseprite_version }}
