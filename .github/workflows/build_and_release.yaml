  build-aseprite:
    name: Build Aseprite
    permissions:
      contents: write
    runs-on: ${{ matrix.os }}
    strategy:
        matrix:
          os: [ windows-latest, ubuntu-latest, macOS-latest ]
        fail-fast: false
    steps:
      - name: Install Dependencies (Ubuntu only)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libpixman-1-dev libfreetype6-dev libharfbuzz-dev zlib1g-dev \
            libx11-dev libxcursor-dev libxi-dev libxrandr-dev libgl1-mesa-dev \
            libfontconfig1-dev

      - name: Checkout Repository
        uses: actions/checkout@v7
      
      - name: Install wget (Windows only)
        if: runner.os == 'Windows'
        run: |
          choco install wget -y --no-progress

      - name: Install Aseprite
        shell: bash
        run: |
          wget -O Aseprite.zip https://github.com/aseprite/aseprite/releases/download/v${{ inputs.aseprite_version }}/Aseprite-v${{ inputs.aseprite_version }}-Source.zip
          unzip Aseprite.zip -d aseprite
      
      - name: Install Skia (Aseprite/Skia) (release m124)
        working-directory: aseprite
        shell: bash
        run: |
          if [[ "${{ runner.os }}" == "Windows" ]] ; then
            wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Windows-Release-x64.zip
            unzip Skia-Windows-Release-x64.zip -d skia
          elif [[ "${{ runner.os }}" == "macOS" ]] ; then
            wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-macOS-Release-arm64.zip
            unzip Skia-macOS-Release-arm64.zip -d skia
          else
            wget https://github.com/aseprite/skia/releases/download/m124-08a5439a6b/Skia-Linux-Release-x64.zip
            unzip Skia-Linux-Release-x64.zip -d skia
          fi

#      gha new runner images have already installed Ninja
#      - name: Install Ninja
#        uses: aseprite/get-ninja@main

      - name: Setup Developer Command Prompt for MSVC (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1.13.0

      - name: Generating Makefiles
        shell: bash
        working-directory: aseprite
        run: |
          export enable_ccache=off
          export laf_backend=skia
          export enable_scripting=on
          export build_type=RelWithDebInfo

          if [[ "${{ runner.os }}" == "macOS" ]] ; then
            export skia_arch=arm64
          else
            export skia_arch=x64
          fi

          cmake -S . -B build -G Ninja \
            -DCMAKE_BUILD_TYPE=$build_type \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=10.9 \
            -DENABLE_TESTS=OFF \
            -DENABLE_SCRIPTING=$enable_scripting \
            -DENABLE_CCACHE=$enable_ccache \
            -DLAF_BACKEND=$laf_backend \
            -DSKIA_DIR=$(realpath skia) \
            -DOPENSSL_USE_STATIC_LIBS=ON \
            -DSKIA_LIBRARY_DIR=$(realpath skia/out/Release-$skia_arch)

      - name: Compiling
        shell: bash
        working-directory: aseprite
        run: |
          cd build && ninja

      - name: Clean Up Build folder
        working-directory: aseprite/build/bin
        shell: bash
        run: find . -mindepth 1 ! \( -name 'aseprite' -o -name 'aseprite.exe' -o -name 'data' -prune -o -name 'Aseprite.app' -prune \) -exec rm -rf {} +

      - name: Make portable zip
        working-directory: aseprite/build/bin
        run: echo '# This file is here so Aseprite behaves as a portable program' > aseprite.ini

#      - name: Create release
#        working-directory: aseprite/build/bin
#        run: 7z -tzip a Aseprite-${{ inputs.aseprite_version }}-${{ runner.os }}.zip *
      
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with: 
          name: Aseprite-${{ inputs.aseprite_version }}-${{ runner.os }}
          path: |
            aseprite/build/bin

#      - name: Upload release
